miembros:
  - nombre: "Aarón Montoya Moraga"
    pronombres:
      es: "(elle)"
      en: "(they)"
    rol:
      es: "Investigador principal"
      en: "Principal Investigator"
    foto: "../media/proyectos/aaron-montoya.jpeg"
    descripcion:
      es: |-
        Aarón Montoya Moraga es ingeniere civil electricista de
        la Pontificia Universidad Católica de Chile (2014).
        Master in Interactive Telecommunications, New York
        University, Estados Unidos (2017). Master of Science in
        Media Arts and Sciences, Massachusetts Institute of
        Technology, Estados Unidos (2021). Actualmente cursa el
        Doctorado en Artes y Humanidades, Universidad de
        Santiago de Chile. Su línea de investigación es en
        interfaces humano computador, diseño computacional
        paramétrico de fuente abierta y diseño de instrumentos
        musicales electrónicos.
      en: |-
        Aarón Montoya Moraga is an electrical civil engineer from
        the Pontificia Universidad Católica de Chile (2014). They
        hold a Master's in Interactive Telecommunications from New
        York University, USA (2017), and a Master of Science in
        Media Arts and Sciences from the Massachusetts Institute of
        Technology, USA (2021). They are currently pursuing a
        PhD in Arts and Humanities at the Universidad de Santiago de
        Chile. Their research focuses on human–computer interfaces,
        open-source parametric computational design, and the design
        of electronic musical instruments.
    links:
      - label:
          es: "sitio"
          en: "website"
        url: "https://montoyamoraga.io/"
      - label:
          es: "instagram"
          en: "instagram"
        url: "https://www.instagram.com/montoyamoraga/?hl=es"
      - label:
          es: "github"
          en: "github"
        url: "https://github.com/montoyamoraga"

  - nombre: "Janis Sepúlveda Vera"
    pronombres:
      es: "(ella)"
      en: "(she)"
    rol:
      es: "Diseñadora"
      en: "Designer"
    foto: "../media/proyectos/janis-sepulveda.jpeg"
    descripcion:
      es: |-
        Janis Sepúlveda Vera es diseñadora industrial de la
        Universidad Diego Portales (2025). Actualmente
        estudiante de Magister en Diseño Avanzado de la
        Pontificia Universidad Católica de Chile.
      en: |-
        Janis Sepúlveda Vera is an industrial designer from
        Universidad Diego Portales (2025) and is currently a
        Master's student in Advanced Design at the Pontificia
        Universidad Católica de Chile.
    links:
